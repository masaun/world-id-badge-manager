[profile.default]
src = "src"
out = "out"
libs = ["lib"]

fs_permissions = [{ access = "read-write", path = "./"},{ access = "read-write", path = "/tmp/"}]
ffi = true

# Solidity compiler configuration
solc_version = "0.8.28"
evm_version = "paris"

optimizer = true
optimizer_runs = 100  # Originally, this was 200. However, to avoid the "Error: HonkVerifier: is above the contract size limit (24639 > 24576)", we set it to 100.
via_ir = false


[profile.remappings]
# ds-test = "lib/forge-std/lib/ds-test/src/"
#forge-std = "lib/foundry-noir-helper/lib/forge-std/src/"
#foundry-noir-helper = "lib/foundry-noir-helper/src/"
remappings = [
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
#sepolia = "${SEPOLIA_RPC}"
base_testnet = "${BASE_TESTNET_RPC}"
world_chain_sepolia = "${WORLD_CHAIN_SEPOLIA_RPC_URL}"
world_chain_mainnet = "${WORLD_CHAIN_MAINNET_RPC_URL}"
#base_mainnet = "${BASE_MAINNET_RPC}"
#arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
#sepolia = { key = "${SEPOLIA_PRIVATE_KEY}" }
world_chain_sepolia = { key = "${WORLD_CHAIN_SCAN_API_KEY}" }
world_chain_mainnet = { key = "${WORLD_CHAIN_SCAN_API_KEY}" }
base_testnet = { key = "${BASESCAN_API_KEY}" }
base_mainnet = { key = "${BASESCAN_API_KEY}" }
#arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

# See more config options https://github.com/foundry-rs/foundry/tree/master/config